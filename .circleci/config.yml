version: 2.1

parameters:
  default-go-image:
    type: string
    default: "cimg/go:1.25"

executors:
  docker-amd64-image:
    parameters:
      go-image:
        type: string
        default: << pipeline.parameters.default-go-image >>
    docker:
      - image: <<parameters.go-image>>
      - image: influxdb:3-core
        environment:
          - INFLUXDB3_NODE_IDENTIFIER_PREFIX=node01
          - INFLUXDB3_OBJECT_STORE=file
          - INFLUXDB3_DB_DIR=/var/lib/influxdb3/data
  docker-arm64-image:
    parameters:
      go-image:
        type: string
        default: << pipeline.parameters.default-go-image >>
    docker:
      - image: <<parameters.go-image>>
      - image: influxdb:3-core
        environment:
          - INFLUXDB3_NODE_IDENTIFIER_PREFIX=node01
          - INFLUXDB3_OBJECT_STORE=file
          - INFLUXDB3_DB_DIR=/var/lib/influxdb3/data
    resource_class: arm.medium

commands:
  upload-codecov-amd64:
    steps:
      - run:
          name: Collecting coverage reports
          command: |
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM
            curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM.sig
            curl -fsSL https://uploader.codecov.io/verification.gpg | gpg --no-default-keyring --keyring trustedkeys.gpg --import
            gpgv codecov.SHA256SUM.sig codecov.SHA256SUM
            shasum -a 256 -c codecov.SHA256SUM
            chmod +x ./codecov
            ./codecov
  upload-codecov-arm64:
    steps:
      - run:
          name: Collecting coverage reports
          command: |
            curl -Os https://uploader.codecov.io/v0.8.0/aarch64/codecov
            curl -Os https://uploader.codecov.io/v0.8.0/aarch64/codecov.SHA256SUM
            curl -Os https://uploader.codecov.io/v0.8.0/aarch64/codecov.SHA256SUM.sig
            curl -k https://uploader.codecov.io/verification.gpg | gpg --no-default-keyring --keyring trustedkeys.gpg --import
            gpgv codecov.SHA256SUM.sig codecov.SHA256SUM
            shasum -a 256 -c codecov.SHA256SUM
            sudo chmod +x codecov
            ./codecov

jobs:
  tests-go:
    parameters:
      go-image:
        type: string
        default: << pipeline.parameters.default-go-image >>
      exe:
        type: string
        default: docker-amd64-image
    executor:
      name: << parameters.exe >>
      go-image: << parameters.go-image >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-v1-{{ checksum "go.sum" }}
      - run:
          name: Install Dependencies
          command: |
            go get -v -t -d ./...
      - save_cache:
          key: go-mod-v1-{{ checksum "go.sum" }}
          paths:
            - "/go/pkg/mod"
      - run:
          name: Create a temp directory for artifacts
          command: |
            mkdir -p /tmp/artifacts
      - run:
          name: Lint go code
          command: |
            go vet  ./...
            go install golang.org/x/lint/golint@latest && golint ./...
      - run:
          name: Setup InfluxDB service
          command: |
            ./scripts/influxdb-setup.sh \
              --export-url-as TESTING_INFLUXDB_URL \
              --export-db-as TESTING_INFLUXDB_DATABASE \
              --export-token-as TESTING_INFLUXDB_TOKEN
      - run:
          name: Run tests
          command: |
            PKGS=$(go list ./... | grep -Ev '/examples/|/influxdb3/testutil')
            go test -v -race -cover -coverprofile=coverage.out --tags e2e ${PKGS}
      - run:
          name: Coverage Report
          command: |
            go tool cover -html=coverage.out -o coverage.html
            mv coverage.html /tmp/artifacts
          when: always
      - when:
          condition:
            equal: [ docker-amd64-image, << parameters.exe >> ]
          steps:
            - upload-codecov-amd64
      - when:
          condition:
            equal: [ docker-arm64-image, << parameters.exe >> ]
          steps:
            - upload-codecov-arm64
      - store_artifacts:
          path: /tmp/artifacts

  lint:
    docker:
      - image: golangci/golangci-lint
    steps:
      - checkout
      - run:
          name: Lint go code
          command: |
            golangci-lint run -v 

  release:
    docker:
      - image: << pipeline.parameters.default-go-image >>
    steps:
      - checkout
      - run:
          name: Verify Envars
          command: |
            echo From config.yml SUPER_SECRET=\"$SUPER_SECRET\"
            echo Release value: << pipeline.git.tag >>
            echo Branch value: << pipeline.git.branch >>
            echo Commit body value: << pipeline.git.commit.body >>
            echo Commit url: << pipeline.git.commit.url >>
            echo Base revision: << pipeline.git.base_revision >>
      - run:
          name: Verify versions
          command: |
            go version
            python --version
      - run:
          name: Install dependencies
          command: |
            if ! command -v pip > /dev/null 2>&1
            then
              # N.B. python is likely managed externally
              python -m venv --without-pip ./venv
              source ./venv/bin/activate
              curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py
              python get-pip.py
            fi
            pip install GitPython
      - run:
          name: Release Script
          command: |
            pip list
            ./scripts/on-release.py

release_filter: &release_filter
  filters:
    tags:
      only:
        - /.*test/
        - /^v[0-9]+(\.[0-9]+){2}(-(rc|beta)[0-9]+)?/
    branches:
      ignore: /.*/

workflows:
  version: 2
  build:
    jobs:
      - tests-go:
          matrix:
            parameters:
              exe: [ docker-amd64-image, docker-arm64-image ]
              go-image: [ << pipeline.parameters.default-go-image >>, "cimg/go:1.26" ]
      - lint

  release:
    jobs:
      - tests-go:
          matrix:
            parameters:
              exe: [ docker-amd64-image ]
              go-image: [ << pipeline.parameters.default-go-image >> ]
          <<: *release_filter
      - release:
          requires:
            - tests-go
          <<: *release_filter
